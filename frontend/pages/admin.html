<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - AMA Scheme</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <h1>AMA SCHEME - ADMIN</h1>
      </div>
      <nav class="nav-menu">
        <a href="admin.html" class="nav-link active">Dashboard</a>
        <a href="admin-withdrawals.html" class="nav-link">Withdrawals</a>
        <a href="admin-analytics.html" class="nav-link">Analytics</a>
        <a href="admin-users.html" class="nav-link">Users</a>
        <button id="logoutBtn" class="nav-link btn-logout">Logout</button>
      </nav>
    </header>

    <main class="admin-dashboard">
      <div class="admin-header">
        <h2>Admin Dashboard</h2>
      </div>

      <div class="admin-stats">
        <div class="stat-card">
          <h3>Total Users</h3>
          <p class="stat-value" id="totalUsers">0</p>
        </div>
        <div class="stat-card">
          <h3>Quiz Attempts</h3>
          <p class="stat-value" id="totalAttempts">0</p>
        </div>
        <div class="stat-card">
          <h3>Total Revenue</h3>
          <p class="stat-value" id="totalRevenue">₦0</p>
        </div>
        <div class="stat-card">
          <h3>Winners</h3>
          <p class="stat-value" id="totalWinners">0</p>
        </div>
        <div class="stat-card">
          <h3>Total Payouts</h3>
          <p class="stat-value" id="totalPayouts">₦0</p>
        </div>
        <div class="stat-card">
          <h3>Pending Withdrawals</h3>
          <p class="stat-value" id="pendingWithdrawals">0</p>
        </div>
      </div>

      <div class="admin-actions">
        <a href="admin-withdrawals.html" class="btn btn-primary">Manage Withdrawals</a>
        <a href="admin-analytics.html" class="btn btn-secondary">View Analytics</a>
        <a href="admin-users.html" class="btn btn-secondary">Manage Users</a>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 AMA Scheme. All rights reserved.</p>
    </footer>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
