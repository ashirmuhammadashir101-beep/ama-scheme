<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Withdrawals - Admin - AMA Scheme</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <h1>AMA SCHEME - ADMIN</h1>
      </div>
      <nav class="nav-menu">
        <a href="admin.html" class="nav-link">Dashboard</a>
        <a href="admin-withdrawals.html" class="nav-link active">Withdrawals</a>
        <a href="admin-analytics.html" class="nav-link">Analytics</a>
        <button id="logoutBtn" class="nav-link btn-logout">Logout</button>
      </nav>
    </header>

    <main class="admin-section">
      <h2>Manage Withdrawal Requests</h2>

      <div class="filter-section">
        <label for="statusFilter">Filter by Status:</label>
        <select id="statusFilter">
          <option value="">All</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>

      <table class="table" id="withdrawalsTable">
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Amount</th>
            <th>Bank</th>
            <th>Account</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="9" class="text-center">Loading...</td>
          </tr>
        </tbody>
      </table>
    </main>

    <footer class="footer">
      <p>&copy; 2026 AMA Scheme. All rights reserved.</p>
    </footer>
  </div>

  <div id="actionModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3 id="modalTitle"></h3>
      <form id="actionForm">
        <input type="hidden" id="withdrawalId">
        <div class="form-group">
          <label for="notes">Notes (optional)</label>
          <textarea id="notes"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
        <button type="button" class="btn btn-secondary modal-close">Cancel</button>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin-withdrawals.js"></script>
</body>
</html>
