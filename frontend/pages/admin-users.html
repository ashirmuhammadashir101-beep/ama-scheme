<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - Admin - AMA Scheme</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <h1>AMA SCHEME - ADMIN</h1>
      </div>
      <nav class="nav-menu">
        <a href="admin.html" class="nav-link">Dashboard</a>
        <a href="admin-users.html" class="nav-link active">Users</a>
        <button id="logoutBtn" class="nav-link btn-logout">Logout</button>
      </nav>
    </header>

    <main class="admin-section">
      <h2>Manage Users</h2>

      <div class="search-section">
        <input type="text" id="searchInput" placeholder="Search users by email or name...">
      </div>

      <table class="table" id="usersTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Registered</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="6" class="text-center">Loading...</td>
          </tr>
        </tbody>
      </table>
    </main>

    <footer class="footer">
      <p>&copy; 2026 AMA Scheme. All rights reserved.</p>
    </footer>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin-users.js"></script>
</body>
</html>
