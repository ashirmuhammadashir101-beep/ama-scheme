<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - Admin - AMA Scheme</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <h1>AMA SCHEME - ADMIN</h1>
      </div>
      <nav class="nav-menu">
        <a href="admin.html" class="nav-link">Dashboard</a>
        <a href="admin-analytics.html" class="nav-link active">Analytics</a>
        <button id="logoutBtn" class="nav-link btn-logout">Logout</button>
      </nav>
    </header>

    <main class="admin-section">
      <h2>System Analytics</h2>

      <div class="admin-stats">
        <div class="stat-card">
          <h3>Total Users</h3>
          <p class="stat-value" id="totalUsers">0</p>
        </div>
        <div class="stat-card">
          <h3>Quiz Attempts</h3>
          <p class="stat-value" id="totalAttempts">0</p>
        </div>
        <div class="stat-card">
          <h3>Total Revenue</h3>
          <p class="stat-value" id="totalRevenue">₦0</p>
        </div>
        <div class="stat-card">
          <h3>Winners</h3>
          <p class="stat-value" id="totalWinners">0</p>
        </div>
        <div class="stat-card">
          <h3>Completed Payments</h3>
          <p class="stat-value" id="completedPayments">0</p>
        </div>
        <div class="stat-card">
          <h3>Pending Payments</h3>
          <p class="stat-value" id="pendingPayments">0</p>
        </div>
      </div>

      <section class="analytics-section">
        <h3>Daily Analytics (Last 30 Days)</h3>
        <table class="table" id="dailyTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Attempts</th>
              <th>Winners</th>
              <th>Revenue</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="4" class="text-center">Loading...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 AMA Scheme. All rights reserved.</p>
    </footer>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin-analytics.js"></script>
</body>
</html>
